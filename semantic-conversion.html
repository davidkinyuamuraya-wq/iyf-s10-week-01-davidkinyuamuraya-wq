<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic HTML Example</title>
</head>

<body>

<header>
<h1>My Site</h1>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</header>

<main>

<article>
<h2>Welcome to My Site</h2>
<p>This is my first paragraph...</p>
<p>This is my second paragraph...</p>
</article>

<aside>
<h2>Recent Posts</h2>
<ul>
<li>Post 1</li>
<li>Post 2</li>
</ul>
</aside>

</main>

<footer>
<p>© 2026</p>
</footer>

</body>
</html>
